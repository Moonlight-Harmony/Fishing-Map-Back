jwt:
  secret: ${JWT_SECRET_KEY}

server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    url: jdbc:postgresql://localhost:5432/postgres
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        show_sql: true
        format_sql: true
        default_batch_fetch_size: 100

file:
  base-domain: ${FILE_BASE_DOMAIN:http://localhost:8080}
  base-path: ${FILE_BASE_PATH:./uploads}
  base-url: ${FILE_BASE_URL:/files}
  fish-species-image: image/fish_species
  fishing-record-image: image/fishing_record




